name: OpenCode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  opencode:
    if: contains(github.event.comment.body, '/oc') || contains(github.event.issue.body, '/oc')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: opencodehq/action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
