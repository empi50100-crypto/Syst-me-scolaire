{% extends 'base.html' %}

{% block title %}Supprimer Cycle{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="bi bi-calendar-range"></i> Supprimer Cycle</h1>
</div>

<div class="card">
    <div class="card-body">
        <p>Êtes-vous sûr de vouloir supprimer le cycle <strong>{{ cycle.libelle }}</strong> ?</p>
        <p class="text-muted">Cette action est irréversible.</p>
        
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">
                <i class="bi bi-trash"></i> Confirmer la suppression
            </button>
            <a href="{% url 'finances:cycle_list' %}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Annuler
            </a>
        </form>
    </div>
</div>
{% endblock %}
