{% extends 'base.html' %}

{% block title %}{% if coefficient %}Modifier{% else %}Nouveau{% endif %} coefficient{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="bi bi-calculator"></i> {% if coefficient %}Modifier{% else %}Nouveau{% endif %} coefficient</h1>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> Enregistrer
                </button>
                <a href="{% url 'enseignement:coefficient_list' %}" class="btn btn-outline-secondary">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
