{% extends 'base.html' %}
{% block title %}Vérification du code{% endblock %}

{% block unauth_content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm mt-5">
            <div class="card-header text-center bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-shield-check"></i> Vérification du code</h4>
            </div>
            <div class="card-body">
                <p class="text-muted mb-3">Un code à 8 chiffres a été envoyé à <strong>{{ email }}</strong>.</p>
                <p class="text-muted small mb-4">Veuillez entrer ce code pour continuer.</p>
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_code" class="form-label">Code de vérification</label>
                        <input type="text" name="code" id="id_code" class="form-control text-center" 
                               style="font-size: 1.5rem; letter-spacing: 0.3rem;" 
                               maxlength="8" pattern="[0-9]{8}" placeholder="00000000" required>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> Vérifier
                        </button>
                        <a href="{% url 'authentification:password_recovery' %}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i> Recommencer
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
