{% extends 'base.html' %}
{% block title %}Récupération d'identifiant{% endblock %}

{% block unauth_content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm mt-5">
            <div class="card-header text-center bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-key"></i> Récupération d'identifiant</h4>
            </div>
            <div class="card-body">
                <p class="text-muted mb-4">Veuillez entrer vos informations pour vérifier votre identité.</p>
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_first_name" class="form-label">Prénom</label>
                        <input type="text" name="first_name" id="id_first_name" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_last_name" class="form-label">Nom</label>
                        <input type="text" name="last_name" id="id_last_name" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_telephone" class="form-label">Numéro de téléphone</label>
                        <input type="text" name="telephone" id="id_telephone" class="form-control" placeholder="+225 00 00 00 00" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_email" class="form-label">Adresse email</label>
                        <input type="email" name="email" id="id_email" class="form-control" required>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-send"></i> Envoyer le code
                        </button>
                        <a href="{% url 'authentification:login' %}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i> Retour à la connexion
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
