{% extends 'base.html' %}
{% block title %}Nouveau mot de passe{% endblock %}

{% block unauth_content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm mt-5">
            <div class="card-header text-center bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-key-fill"></i> Nouveau mot de passe</h4>
            </div>
            <div class="card-body">
                <p class="text-muted mb-4">Veuillez entrer votre nouveau nom d'utilisateur et mot de passe.</p>
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Nouveau nom d'utilisateur (optionnel)</label>
                        <input type="text" name="username" id="id_username" class="form-control" placeholder="Laissez vide pour conserver l'actuel">
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_password1" class="form-label">Nouveau mot de passe</label>
                        <input type="password" name="password1" id="id_password1" class="form-control" required minlength="8">
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_password2" class="form-label">Confirmer le mot de passe</label>
                        <input type="password" name="password2" id="id_password2" class="form-control" required>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-all"></i> Réinitialiser
                        </button>
                        <a href="{% url 'accounts:login' %}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i> Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
