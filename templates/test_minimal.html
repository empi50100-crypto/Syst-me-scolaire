{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Test</title>
    <style>
        .navbar { background: #333; }
        .navbar-brand { font-weight: bold; }
        .sidebar { width: 250px; background: #444; }
        .nav-group { margin: 10px 0; }
        .group-header { padding: 10px; font-weight: bold; }
        .dropdown-menu { position: absolute; }
        .nav-badge { background: red; color: white; border-radius: 50%; }
    </style>
    <script>console.log('test');</script>
</head>
<body>
{% if user.is_authenticated %}
    <nav class="navbar navbar-expand-lg">
        <a class="navbar-brand" href="/">Test</a>
        <div class="dropdown">
            <ul class="dropdown-menu">
            {% for annee in annees %}
                <li><a class="dropdown-item {% if annee.pk == request.annee_active.pk %}active{% endif %}">
                    {% if annee.est_active %}<i></i>{% else %}{% endif %}
                </a></li>
            {% endfor %}
            </ul>
        </div>
    </nav>
    <div class="d-flex">
        <nav class="sidebar">
            <div class="nav-group">
                <div class="group-header">Menu</div>
                <a href="/">Link</a>
            </div>
        </nav>
    </div>
{% endif %}
</body>
</html>
