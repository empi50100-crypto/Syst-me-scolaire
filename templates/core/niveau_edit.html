{% extends "base.html" %}
{% block title %}Modifier un niveau - SyGeS-AM{% endblock %}

{% block content %}
<div class="container-fluid">
    <h2>Modifier un niveau scolaire</h2>
    
    <form method="post" class="card p-4" style="max-width: 600px;">
        {% csrf_token %}
        
        <div class="mb-3">
            <label class="form-label">Niveau</label>
            <input type="text" name="niveau" class="form-control" value="{{ niveau.niveau }}" readonly>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Libellé</label>
            <input type="text" name="libelle" class="form-control" value="{{ niveau.libelle }}" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Ordre d'affichage</label>
            <input type="number" name="ordre" class="form-control" value="{{ niveau.ordre }}" required min="1">
        </div>
        
        <button type="submit" class="btn btn-primary">Enregistrer</button>
        <a href="/core/niveaux/" class="btn btn-secondary">Annuler</a>
    </form>
</div>
{% endblock %}
