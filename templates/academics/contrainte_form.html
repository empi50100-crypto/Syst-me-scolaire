{% extends 'base.html' %}

{% block title %}{% if contrainte %}Modifier{% else %}Nouvelle{% endif %} contrainte{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="bi bi-calendar-week"></i> {% if contrainte %}Modifier{% else %}Nouvelle{% endif %} contrainte</h1>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> Enregistrer
                </button>
                <a href="{% url 'academics:contrainte_list' %}" class="btn btn-outline-secondary">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
