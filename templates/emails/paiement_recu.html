<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #4472C4; color: white; padding: 20px; text-align: center; border-radius: 8px 8px 0 0; }
        .content { background: #f9f9f9; padding: 20px; border: 1px solid #ddd; }
        .footer { background: #f0f0f0; padding: 15px; text-align: center; font-size: 12px; color: #666; border-radius: 0 0 8px 8px; }
        .btn { display: inline-block; padding: 10px 20px; background: #4472C4; color: white; text-decoration: none; border-radius: 5px; }
        .amount { font-size: 24px; font-weight: bold; color: #28a745; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 Reçu de Paiement</h1>
        </div>
        <div class="content">
            <p>Bonjour,</p>
            <p>Nous avons bien reçu votre paiement pour <strong>{{ eleve.nom_complet }}</strong>.</p>
            
            <h2>Détails du paiement</h2>
            <table style="width: 100%; border-collapse: collapse;">
                <tr>
                    <td style="padding: 8px; border-bottom: 1px solid #ddd;"><strong>Montant</strong></td>
                    <td style="padding: 8px; border-bottom: 1px solid #ddd;" class="amount">{{ montant }} CFA</td>
                </tr>
                <tr>
                    <td style="padding: 8px; border-bottom: 1px solid #ddd;"><strong>Date</strong></td>
                    <td style="padding: 8px; border-bottom: 1px solid #ddd;">{{ date }}</td>
                </tr>
                <tr>
                    <td style="padding: 8px; border-bottom: 1px solid #ddd;"><strong>Élève</strong></td>
                    <td style="padding: 8px; border-bottom: 1px solid #ddd;">{{ eleve.nom_complet }}</td>
                </tr>
            </table>
            
            <p>Merci pour votre règlement.</p>
        </div>
        <div class="footer">
            <p>© 2026 Système de Gestion Scolaire</p>
        </div>
    </div>
</body>
</html>
