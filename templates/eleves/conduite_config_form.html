{% extends 'base.html' %}

{% block title %}Configuration Conduite - SyGeS-AM{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% url 'dashboard' %}">Accueil</a></li>
                <li class="breadcrumb-item"><a href="{% url 'eleves:conduite_config_list' %}">Configuration Conduite</a></li>
                <li class="breadcrumb-item active">Modifier</li>
            </ol>
        </nav>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-gear"></i> Configuration de la Conduite</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Niveau</label>
                        <select name="niveau" class="form-select" required>
                            {% for niveau_label, niveau_value in niveaux %}
                            <option value="{{ niveau_value }}" {% if selected_niveau == niveau_value %}selected{% endif %}>
                                {{ niveau_value }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Note de base (/20)</label>
                        <input type="number" name="note_base" class="form-control" step="0.01" min="0" max="20" 
                               value="{{ config.note_base|default:'20' }}" required>
                        <div class="form-text">Note attribuée à tous les élèves de ce niveau pour toute l'année</div>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'eleves:conduite_config_list' %}" class="btn btn-secondary">Annuler</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> Enregistrer
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
